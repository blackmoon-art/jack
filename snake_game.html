<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  .game-container {
    background: #16213e;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    text-align: center;
  }
  h1 {
    color: #00d2ff;
    font-size: 28px;
    margin-bottom: 15px;
    letter-spacing: 2px;
  }
  .score-box {
    display: flex;
    justify-content: space-between;
    color: #fff;
    font-size: 18px;
    margin-bottom: 10px;
    padding: 0 5px;
  }
  .score-box span { color: #ffd700; font-weight: bold; font-size: 22px; }
  canvas {
    border: 2px solid #0f3460;
    border-radius: 10px;
    display: block;
    margin: 0 auto;
    background: #0f3460;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
  }
  .controls {
    margin-top: 15px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  button {
    background: #e94560;
    color: #fff;
    border: none;
    padding: 10px 25px;
    border-radius: 30px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: bold;
  }
  button:hover { background: #ff6b81; transform: scale(1.05); }
  button.restart { background: #0f3460; }
  button.restart:hover { background: #1a4a7a; }
  .hint {
    color: #888;
    margin-top: 12px;
    font-size: 14px;
  }
  .hint kbd {
    background: #0f3460;
    color: #00d2ff;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 13px;
  }
  .game-over {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 30px 50px;
    border-radius: 15px;
    display: none;
  }
  .game-over h2 { color: #e94560; font-size: 32px; margin-bottom: 10px; }
  .game-over p { font-size: 18px; margin-bottom: 15px; }
  .game-over .final-score { color: #ffd700; font-size: 26px; }
  .wrapper { position: relative; display: inline-block; }
</style>
</head>
<body>

<div class="game-container">
  <h1>🐍 贪吃蛇</h1>
  <div class="score-box">
    <div>🏆 得分 <span id="score">0</span></div>
    <div>🥇 最高 <span id="highScore">0</span></div>
  </div>
  <div class="wrapper">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="game-over" id="gameOver">
      <h2>💀 游戏结束</h2>
      <p>得分: <span class="final-score" id="finalScore">0</span></p>
      <button onclick="restartGame()" class="restart">🔄 再来一局</button>
    </div>
  </div>
  <div class="controls">
    <button onclick="restartGame()" class="restart">🔄 重新开始</button>
  </div>
  <div class="hint">
    使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 控制方向
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const finalScoreEl = document.getElementById('finalScore');
const gameOverEl = document.getElementById('gameOver');

const GRID_SIZE = 20;
const CELL_SIZE = canvas.width / GRID_SIZE;

let snake, direction, nextDirection, food, score, highScore, gameLoop, speed, gameRunning;

function init() {
  snake = [
    {x: 10, y: 10},
    {x: 9, y: 10},
    {x: 8, y: 10}
  ];
  direction = {x: 1, y: 0};
  nextDirection = {x: 1, y: 0};
  score = 0;
  speed = 150;
  gameRunning = true;
  scoreEl.textContent = '0';
  gameOverEl.style.display = 'none';
  highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
  highScoreEl.textContent = highScore;
  spawnFood();
  draw();
}

function spawnFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * GRID_SIZE),
      y: Math.floor(Math.random() * GRID_SIZE)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function draw() {
  // 背景
  ctx.fillStyle = '#0f3460';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 网格线（暗）
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID_SIZE; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL_SIZE, 0);
    ctx.lineTo(i * CELL_SIZE, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * CELL_SIZE);
    ctx.lineTo(canvas.width, i * CELL_SIZE);
    ctx.stroke();
  }

  // 食物
  ctx.shadowColor = '#ff6b6b';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#ff4757';
  ctx.beginPath();
  const fx = food.x * CELL_SIZE + CELL_SIZE/2;
  const fy = food.y * CELL_SIZE + CELL_SIZE/2;
  ctx.arc(fx, fy, CELL_SIZE/2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // 蛇
  snake.forEach((seg, i) => {
    const x = seg.x * CELL_SIZE;
    const y = seg.y * CELL_SIZE;
    const padding = 1;
    const radius = 4;

    if (i === 0) {
      // 蛇头
      ctx.fillStyle = '#00d2ff';
      ctx.shadowColor = '#00d2ff';
      ctx.shadowBlur = 10;
    } else {
      ctx.fillStyle = i % 2 === 0 ? '#00b894' : '#00a381';
      ctx.shadowBlur = 0;
    }

    ctx.beginPath();
    ctx.roundRect(x + padding, y + padding, CELL_SIZE - padding*2, CELL_SIZE - padding*2, radius);
    ctx.fill();
    ctx.shadowBlur = 0;

    // 蛇头眼睛
    if (i === 0) {
      ctx.fillStyle = '#fff';
      const eyeSize = 3;
      let ex1, ey1, ex2, ey2;
      if (direction.x === 1) { ex1 = x+14; ey1 = y+4; ex2 = x+14; ey2 = y+12; }
      else if (direction.x === -1) { ex1 = x+4; ey1 = y+4; ex2 = x+4; ey2 = y+12; }
      else if (direction.y === -1) { ex1 = x+4; ey1 = y+4; ex2 = x+12; ey2 = y+4; }
      else { ex1 = x+4; ey1 = y+14; ex2 = x+12; ey2 = y+14; }
      ctx.beginPath(); ctx.arc(ex1, ey1, eyeSize, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, eyeSize, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath(); ctx.arc(ex1, ey1, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, 1.5, 0, Math.PI*2); ctx.fill();
    }
  });
}

// roundRect polyfill for canvas
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (r > w/2) r = w/2;
    if (r > h/2) r = h/2;
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
    return this;
  };
}

function update() {
  if (!gameRunning) return;

  direction = {...nextDirection};

  const head = {
    x: snake[0].x + direction.x,
    y: snake[0].y + direction.y
  };

  // 撞墙检测（穿墙模式，可选。这里用撞墙结束）
  if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
    endGame();
    return;
  }

  // 撞自身
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame();
    return;
  }

  snake.unshift(head);

  // 吃食物
  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    if (score > highScore) {
      highScore = score;
      highScoreEl.textContent = highScore;
      localStorage.setItem('snakeHighScore', highScore);
    }
    spawnFood();
    // 加速
    if (speed > 60) speed -= 2;
    clearInterval(gameLoop);
    gameLoop = setInterval(() => { update(); draw(); }, speed);
  } else {
    snake.pop();
  }
}

function endGame() {
  gameRunning = false;
  clearInterval(gameLoop);
  finalScoreEl.textContent = score;
  gameOverEl.style.display = 'block';
}

function restartGame() {
  clearInterval(gameLoop);
  init();
  gameLoop = setInterval(() => { update(); draw(); }, speed);
}

// 键盘控制
document.addEventListener('keydown', (e) => {
  const key = e.key;
  e.preventDefault();

  const map = {
    'ArrowUp': {x: 0, y: -1},
    'ArrowDown': {x: 0, y: 1},
    'ArrowLeft': {x: -1, y: 0},
    'ArrowRight': {x: 1, y: 0},
    'w': {x: 0, y: -1}, 'W': {x: 0, y: -1},
    's': {x: 0, y: 1},  'S': {x: 0, y: 1},
    'a': {x: -1, y: 0}, 'A': {x: -1, y: 0},
    'd': {x: 1, y: 0},  'D': {x: 1, y: 0}
  };

  const newDir = map[key];
  if (!newDir) return;

  // 不允许直接掉头
  if (newDir.x + direction.x === 0 && newDir.y + direction.y === 0) return;

  nextDirection = newDir;

  // 触屏方向按钮（手机用）
  if (key.startsWith('Arrow')) e.preventDefault();
});

// 触屏滑动支持
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  e.preventDefault();
});
canvas.addEventListener('touchmove', (e) => e.preventDefault());
canvas.addEventListener('touchend', (e) => {
  const rect = canvas.getBoundingClientRect();
  const endX = touchStartX;
  const endY = touchStartY;
  // 用touch start位置和canvas中心比较
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const dx = endX - cx;
  const dy = endY - cy;
  const adx = Math.abs(dx);
  const ady = Math.abs(dy);
  if (adx > ady && adx > 20) {
    const newDir = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
    if (!(newDir.x + direction.x === 0 && newDir.y + direction.y === 0)) nextDirection = newDir;
  } else if (ady > 20) {
    const newDir = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
    if (!(newDir.x + direction.x === 0 && newDir.y + direction.y === 0)) nextDirection = newDir;
  }
  e.preventDefault();
});

// 启动游戏
init();
gameLoop = setInterval(() => { update(); draw(); }, speed);
</script>

</body>
</html>
