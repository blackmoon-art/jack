<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 背景 -->
  <rect width="400" height="400" fill="#FFF8E7"/>

  <!-- 身体 -->
  <ellipse cx="200" cy="280" rx="90" ry="80" fill="#F4A460"/>

  <!-- 尾巴 -->
  <path d="M 290 280 Q 340 240 330 200 Q 320 170 340 150" stroke="#F4A460" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- 左后腿 -->
  <ellipse cx="150" cy="340" rx="30" ry="25" fill="#F4A460"/>
  <!-- 右后腿 -->
  <ellipse cx="250" cy="340" rx="30" ry="25" fill="#F4A460"/>

  <!-- 左前腿 -->
  <rect x="130" y="300" width="22" height="50" rx="10" fill="#F4A460"/>
  <!-- 右前腿 -->
  <rect x="198" y="300" width="22" height="50" rx="10" fill="#F4A460"/>

  <!-- 头部 -->
  <circle cx="200" cy="170" r="75" fill="#F4A460"/>

  <!-- 左耳 -->
  <polygon points="145,120 125,50 175,100" fill="#F4A460" stroke="#F4A460" stroke-width="2"/>
  <!-- 左耳内部 -->
  <polygon points="148,115 133,62 170,100" fill="#FFB6C1"/>

  <!-- 右耳 -->
  <polygon points="255,120 275,50 225,100" fill="#F4A460" stroke="#F4A460" stroke-width="2"/>
  <!-- 右耳内部 -->
  <polygon points="252,115 267,62 230,100" fill="#FFB6C1"/>

  <!-- 左眼 -->
  <ellipse cx="175" cy="160" rx="18" ry="20" fill="white"/>
  <ellipse cx="175" cy="160" rx="12" ry="14" fill="#2E8B57"/>
  <ellipse cx="175" cy="155" rx="8" ry="10" fill="black"/>
  <ellipse cx="172" cy="152" rx="3" ry="3" fill="white"/>

  <!-- 右眼 -->
  <ellipse cx="225" cy="160" rx="18" ry="20" fill="white"/>
  <ellipse cx="225" cy="160" rx="12" ry="14" fill="#2E8B57"/>
  <ellipse cx="225" cy="155" rx="8" ry="10" fill="black"/>
  <ellipse cx="222" cy="152" rx="3" ry="3" fill="white"/>

  <!-- 鼻子 -->
  <polygon points="200,180 193,188 207,188" fill="#FF69B4"/>

  <!-- 嘴巴 -->
  <path d="M 200 188 Q 190 198 182 192" stroke="#333" stroke-width="1.5" fill="none"/>
  <path d="M 200 188 Q 210 198 218 192" stroke="#333" stroke-width="1.5" fill="none"/>

  <!-- 胡须左侧 -->
  <line x1="165" y1="182" x2="120" y2="175" stroke="#333" stroke-width="1"/>
  <line x1="165" y1="188" x2="118" y2="192" stroke="#333" stroke-width="1"/>
  <line x1="165" y1="194" x2="122" y2="205" stroke="#333" stroke-width="1"/>

  <!-- 胡须右侧 -->
  <line x1="235" y1="182" x2="280" y2="175" stroke="#333" stroke-width="1"/>
  <line x1="235" y1="188" x2="282" y2="192" stroke="#333" stroke-width="1"/>
  <line x1="235" y1="194" x2="278" y2="205" stroke="#333" stroke-width="1"/>

  <!-- 花纹条纹 -->
  <path d="M 180 110 Q 200 125 220 110" stroke="#D2691E" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 175 125 Q 200 140 225 125" stroke="#D2691E" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- 前爪肉垫 -->
  <ellipse cx="141" cy="348" rx="6" ry="4" fill="#FFB6C1"/>
  <ellipse cx="209" cy="348" rx="6" ry="4" fill="#FFB6C1"/>
</svg>