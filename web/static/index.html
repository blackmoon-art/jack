<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>Sleeping fox</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background:#111; color:#e0e0e0; height:100vh; height:100dvh; display:flex; flex-direction:column;
         overscroll-behavior:none; -webkit-overflow-scrolling:touch;
         touch-action:manipulation; position:fixed; width:100%; }
  header { background:#1a1a2e; padding:12px 20px; display:flex; align-items:center;
           gap:16px; border-bottom:1px solid #333; }
  header h1 { font-size:18px; color:#7c3aed; }
  header select { background:#222; color:#e0e0e0; border:1px solid #444;
                  padding:6px 12px; border-radius:6px; font-size:14px; cursor:pointer; }
  header .info { font-size:12px; color:#888; }
  #messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
  .msg { max-width:85%; padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.6;
         word-wrap:break-word; }
  .msg.user { align-self:flex-end; background:#7c3aed; color:#fff !important; }
  .msg.agent { align-self:flex-start; background:#1e1e2e; border:1px solid #333; color:#ffffff !important; }
  .msg .content { white-space:pre-wrap; color:#ffffff; }
  .msg .content strong { color:#ffffff; }
  .msg .content h1, .msg .content h2, .msg .content h3 { color:#ffffff; margin:8px 0 4px; }
  .msg .content em { color:#dddddd; }
  .msg .content table { border-collapse:collapse; margin:8px 0; width:100%; }
  .msg .content th, .msg .content td { border:1px solid #444; padding:4px 10px; text-align:left; color:#ffffff; }
  .msg .content th { background:#2a2a3e; font-weight:600; }
  .msg .content pre { background:#0d0d1a; border:1px solid #333; border-radius:8px;
                       padding:12px; overflow-x:auto; margin:8px 0; font-size:13px; }
  .msg .content code { background:#333; padding:1px 5px; border-radius:3px; font-size:12px; }
  .msg .content pre code { background:none; padding:0; }
  .msg .content img { max-width:100%; border-radius:8px; margin:8px 0; }
  .msg .content a { color:#7c3aed; text-decoration:underline; }
  .msg .content .katex-display { margin:12px 0; overflow-x:auto; }
  .msg .content .katex { font-size:1.1em; }
  .msg .content ul, .msg .content ol { margin:4px 0 4px 20px; }
  .msg .content li { margin:2px 0; }

  /* 思考过程折叠 */
  .thinking-summary { display:inline-block; padding:3px 10px; margin:0 0 6px 0;
                       background:#1e1e2e; border:1px solid #333; border-radius:10px;
                       font-size:11px; color:#7c3aed; cursor:pointer; user-select:none;
                       transition: background .15s; }
  .thinking-summary:hover { background:#2a2a3e; }
  .thinking-summary::before { content:'▶ '; font-size:9px; }
  .thinking-summary.open::before { content:'▼ '; font-size:9px; }
  .thinking-block { display:none; }
  .thinking-block.visible { display:block; }
  .thought { padding:8px 12px; margin:4px 0; border-left:3px solid #f59e0b; font-size:13px;
             color:#fbbf24; background:#1a1a15; border-radius:0 6px 6px 0; }
  .tool-call { padding:8px 12px; margin:4px 0; border-left:3px solid #3b82f6; font-size:13px;
               background:#0f172a; border-radius:0 6px 6px 0; font-family:monospace; }
  .tool-call .name { color:#60a5fa; font-weight:600; }
  .tool-result { padding:8px 12px; margin:4px 0; border-left:3px solid #10b981; font-size:13px;
                 color:#6ee7b7; background:#0a1a15; border-radius:0 6px 6px 0;
                 max-height:200px; overflow-y:auto; }
  .orient { padding:6px 10px; margin:4px 0; font-size:12px; color:#94a3b8; font-style:italic; }

  /* Loading 动画 */
  .loading-dots { display:inline-flex; gap:4px; padding:8px 0; }
  .loading-dots span { width:8px; height:8px; border-radius:50%; background:#7c3aed;
                        animation: bounce 1.4s infinite ease-in-out; }
  .loading-dots span:nth-child(1) { animation-delay:0s; }
  .loading-dots span:nth-child(2) { animation-delay:0.2s; }
  .loading-dots span:nth-child(3) { animation-delay:0.4s; }
  @keyframes bounce { 0%,80%,100% { transform:scale(0); } 40% { transform:scale(1); } }

  footer { padding:16px 20px; border-top:1px solid #333; display:flex; gap:10px; background:#1a1a2e; }
  footer input { flex:1; background:#000; color:#e0e0e0;
                 border:1px solid #444; padding:10px 16px;
                 border-radius:8px; font-size:14px; outline:none; }
  footer input::placeholder { color:#888; }
  footer input:focus { border-color:#7c3aed; }
  footer button { background:#7c3aed; color:#fff; border:none; padding:10px 20px;
                  border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; }
  footer button:disabled { opacity:0.5; cursor:not-allowed; }
  @media (max-width:600px) {
    footer { flex-wrap:wrap; }
    footer input { flex:100%; }
    footer select { flex:1; }
  }
  .status { text-align:center; padding:8px; font-size:12px; color:#666; }
</style>
</head>
<body>

<header>
  <h1><svg width="36" height="36" viewBox="0 0 200 200" style="vertical-align:middle;margin-right:6px;"><rect width="200" height="200" rx="20" fill="#1a1a2e"/><path d="M70,155 Q35,145 30,110 Q25,75 50,55 Q55,40 45,25 Q60,30 68,42 Q75,35 90,30 Q105,25 120,35 Q130,28 140,25 Q145,30 138,48 Q160,65 158,100 Q155,140 125,155 Q100,168 70,155Z" fill="#e8751a" stroke="#1a1a2e" stroke-width="5"/><path d="M65,150 Q40,140 38,110 Q36,80 55,65 Q90,90 125,65 Q145,80 140,110 Q138,140 115,150 Q95,160 65,150Z" fill="#f5a623"/><path d="M50,55 Q55,40 45,25 Q60,30 68,42" fill="#e8751a" stroke="#1a1a2e" stroke-width="5" stroke-linejoin="round"/><path d="M140,25 Q145,30 138,48" fill="#e8751a" stroke="#1a1a2e" stroke-width="5" stroke-linejoin="round"/><path d="M55,50 Q58,38 50,28" fill="#1a1a2e"/><path d="M132,50 Q135,38 135,28" fill="#1a1a2e"/><path d="M75,120 Q60,130 55,145 Q60,160 80,160 Q100,165 120,155 Q130,145 125,125 Q115,118 100,120 Q85,118 75,120Z" fill="#fff" stroke="#1a1a2e" stroke-width="4"/><path d="M140,100 Q155,85 160,95 Q165,110 150,120 Q135,130 125,125" fill="#e8751a" stroke="#1a1a2e" stroke-width="5"/><path d="M155,100 Q160,92 158,95" fill="#fff"/><ellipse cx="80" cy="90" rx="8" ry="3" fill="#1a1a2e"/><ellipse cx="112" cy="90" rx="8" ry="3" fill="#1a1a2e"/><ellipse cx="96" cy="105" rx="5" ry="4" fill="#1a1a2e"/><path d="M88,112 Q96,118 104,112" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/><text x="148" y="50" font-size="18" fill="#7c3aed" font-family="serif" font-weight="bold" opacity="0.8">z</text><text x="158" y="38" font-size="14" fill="#7c3aed" font-family="serif" opacity="0.6">z</text><text x="164" y="28" font-size="10" fill="#7c3aed" font-family="serif" opacity="0.4">z</text></svg>Sleeping fox</h1>
  <select id="strategy">
    <option value="auto">🤖 Auto</option>
    <option value="default">Default</option>
    <option value="react">ReAct</option>
    <option value="plan-execute">Plan-Execute</option>
    <option value="reflexion">Reflexion</option>
    <option value="tree-of-thought">Tree-of-Thought</option>
  </select>
  <span class="info" id="status">就绪</span>

</header>

<div id="messages"></div>

<div class="status" id="session-info"></div>

<footer>
  <input type="text" id="input" placeholder="输入任务..." autofocus />
  <select id="model" style="background:#222;color:#e0e0e0;border:1px solid #444;padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;">
    <option value="">Default</option>
    <option value="deepseek-v4-flash">deepseek-v4-flash</option>
    <option value="deepseek-v4-pro">deepseek-v4-pro</option>
    <option value="deepseek-chat">deepseek-chat</option>
    <option value="deepseek-reasoner">deepseek-reasoner</option>
  </select>
  <button id="send">Send</button>
</footer>

<script>
// 访问码（管理员不用次数限制）
const ACCESS_CODE = '';
let SESSION_ID = localStorage.getItem('nano_session_id');
if (!SESSION_ID) {
  SESSION_ID = crypto.randomUUID().slice(0, 12);
  localStorage.setItem('nano_session_id', SESSION_ID);
}
const $messages = document.getElementById('messages');
const $input = document.getElementById('input');
const $send = document.getElementById('send');
const $strategy = document.getElementById('strategy');
const $model = document.getElementById('model');
const $status = document.getElementById('status');
document.getElementById('session-info').textContent = `会话: ${SESSION_ID}`;

let currentMsg = null;
let thinkingCount = 0;
let chartImages = [];

// ── 历史恢复 ─────────────────────────────────────────

(async function restoreHistory() {
  try {
    const res = await fetch(`/api/sessions/${SESSION_ID}/history`, {
      headers: {'ngrok-skip-browser-warning': 'true'},
    });
    const data = await res.json();
    if (data.history && data.history.length > 0) {
      for (const msg of data.history) {
        addMessage(msg.role, msg.content);
      }
      $messages.scrollTop = $messages.scrollHeight;
    }
  } catch(e) { /* 忽略 */ }
})();

// ── 消息渲染 ─────────────────────────────────────────

function addMessage(role, text, extraHtml = '') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const content = text ? renderContent(text) : '';
  const body = extraHtml + (content ? `<div class="content">${content}</div>` : '');
  div.innerHTML = body || '';
  $messages.appendChild(div);
  $messages.scrollTop = $messages.scrollHeight;
  return div;
}

function addThinkingBlock(cls, text) {
  if (!currentMsg) return;
  let block = currentMsg.querySelector('.thinking-block');
  if (!block) {
    block = document.createElement('div');
    block.className = 'thinking-block';
    currentMsg.appendChild(block);
  }

  const inner = document.createElement('div');
  inner.className = cls;
  inner.innerHTML = escapeHtml(text);
  block.appendChild(inner);

  thinkingCount++;
  let tag = currentMsg.querySelector('.thinking-summary');
  if (tag) tag.textContent = `👽 ${thinkingCount} 步思考过程`;
}

function ensureThinkingTag() {
  if (!currentMsg) return;
  if (currentMsg.querySelector('.thinking-summary')) return;
  const tag = document.createElement('div');
  tag.className = 'thinking-summary';
  tag.textContent = `👽 ${thinkingCount} 步思考过程`;
  tag.addEventListener('click', () => {
    const block = tag.parentElement.querySelector('.thinking-block');
    if (!block) return;
    const open = block.classList.toggle('visible');
    tag.classList.toggle('open', open);
  });
  currentMsg.insertBefore(tag, currentMsg.firstChild);
}

function removeThinkingIfEmpty() {
  // 如果思考块里没有内容，移除整个折叠区域
  if (!currentMsg) return;
  const block = currentMsg.querySelector('.thinking-block');
  const tag = currentMsg.querySelector('.thinking-summary');
  if (block && !block.children.length) {
    block.remove();
    if (tag) tag.remove();
  }
}

// ── Markdown 渲染 ─────────────────────────────────────

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── KaTeX 数学公式渲染 ────────────────────────────────

function renderMath(el) {
  // 渲染 $$...$$ 块级公式和 $...$ 行内公式
  try {
    renderMathInElement(el, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
      ],
      throwOnError: false,
    });
  } catch(e) { /* KaTeX 未加载则忽略 */ }
}

// ── Markdown 渲染 ─────────────────────────────────────

function renderContent(text) {
  // 1. Escape HTML
  let html = escapeHtml(text);

  // 2. Code blocks: ```lang\n...\n``` → <pre><code>...</code></pre>
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
    return `<pre><code>${code.trim()}</code></pre>`;
  });

  // 3. Markdown table: | ... | ... |\n|---|---|\n| ... | ... |
  html = html.replace(/((?:^\|.+\|$\n?)+)/gm, function(tableBlock) {
    const rows = tableBlock.trim().split('\n');
    let tableHtml = '<table>';
    let isHeader = true;
    for (const row of rows) {
      // Skip separator rows
      if (/^\|[\s:|-]+\|$/.test(row)) continue;
      const cells = row.split('|').filter(c => c.trim() !== '');
      const tag = isHeader ? 'th' : 'td';
      tableHtml += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
      isHeader = false;
    }
    tableHtml += '</table>';
    return tableHtml;
  });

  // 4. Images: ![alt](url) → <img>
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,
    '<img src="$2" alt="$1" />');

  // 5. Links: [text](url) → <a>
  html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s\)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // 6. Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // 7. Bold & Italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // 8. Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // 9. Unordered lists: - item or * item
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // 10. Bare URLs
  html = html.replace(/(https?:\/\/[^\s<>"']+)(?=\s|$)/g,
    '<a href="$1" target="_blank" rel="noopener">$1</a>');

  return html;
}

// ── 发送消息 ─────────────────────────────────────────

async function send() {
  const task = $input.value.trim();
  if (!task) return;

  $send.disabled = true;
  $input.disabled = true;
  thinkingCount = 0;
  chartImages = [];

  addMessage('user', task);

  // 显示 loading 动画
  currentMsg = addMessage('agent', '');
  currentMsg.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

  $status.textContent = '思考中...';
  $messages.scrollTop = $messages.scrollHeight;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'ngrok-skip-browser-warning': 'true',
      },
      body: JSON.stringify({
        message: task,
        strategy: $strategy.value,
        session_id: SESSION_ID,
        model: $model.value,
      }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let gotContent = false;  // 是否收到了实质内容

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});

      const parts = buffer.split('\n\n');
      buffer = parts.pop() || '';

      for (const part of parts) {
        const lines = part.split('\n');
        let eventType = '';
        let dataStr = '';

        for (const line of lines) {
          if (line.startsWith('event: ')) eventType = line.slice(7);
          if (line.startsWith('data: ')) dataStr = line.slice(6);
        }

        if (!dataStr) continue;
        try {
          const data = JSON.parse(dataStr);

          switch (eventType) {
            case 'text': {
              // 状态通知（Task/Strategy/计划等），显示在思考折叠块
              if (!gotContent) {
                // 第一次收到内容，移除 loading 动画
                currentMsg.innerHTML = '';
                gotContent = true;
              }
              if (data.text) {
                ensureThinkingTag();
                addThinkingBlock('thought', data.text);
              }
              break;
            }
            case 'tool_call': {
              if (!gotContent) { currentMsg.innerHTML = ''; gotContent = true; }
              ensureThinkingTag();
              addThinkingBlock('tool-call',
                `🔧 ${data.name}(${JSON.stringify(data.args)})`);
              $status.textContent = `执行: ${data.name}...`;
              break;
            }
            case 'tool_result': {
              if (!gotContent) { currentMsg.innerHTML = ''; gotContent = true; }
              ensureThinkingTag();
              addThinkingBlock('tool-result', data.result?.slice(0, 1000) || '');
              // 收集图表图片 URL
              const urls = (data.result || '').match(/!\[[^\]]*\]\((\/charts\/[^)]+)\)/g);
              if (urls) urls.forEach(m => {
                const u = m.match(/\(\/charts\/[^)]+\)/)[0].slice(1, -1);
                if (!chartImages.includes(u)) chartImages.push(u);
              });
              break;
            }
            case 'orient': {
              if (!gotContent) { currentMsg.innerHTML = ''; gotContent = true; }
              ensureThinkingTag();
              addThinkingBlock('orient',
                `💡 ${data.implication || data.interpretation || ''}`.slice(0, 200));
              break;
            }
            case 'done': {
              // 最终答案 → 替换当前消息内容
              if (data.text) {
                let answerText = data.text;
                // 清除 LLM 幻觉的绝对 URL 图片（chartImages 已提供相对路径版本）
                answerText = answerText.replace(/!\[[^\]]*\]\(https?:\/\/[^\s)]*\/charts\/[^\s)]+\)/g, '');

                const imgs = chartImages.map(u =>
                  `<img src="${u}" style="max-width:100%;border-radius:8px;margin:8px 0;" />`
                ).join('');
                // 清空当前消息，显示最终答案
                currentMsg.innerHTML = imgs + `<div class="content">${renderContent(answerText)}</div>`;
                // 渲染数学公式
                const contentDiv = currentMsg.querySelector('.content');
                if (contentDiv) renderMath(contentDiv);
              } else {
                // done 没有 text，移除空气泡
                removeThinkingIfEmpty();
                if (!currentMsg.querySelector('.content, .thinking-summary')) {
                  currentMsg.remove();
                }
              }
              currentMsg = null;
              $status.textContent = '就绪';
              break;
            }
            case 'error': {
              if (!gotContent) { currentMsg.innerHTML = ''; gotContent = true; }
              ensureThinkingTag();
              addThinkingBlock('tool-result', `❌ ${data.text}`);
              $status.textContent = '错误';
              break;
            }
          }
        } catch(e) { /* skip malformed */ }
      }
      $messages.scrollTop = $messages.scrollHeight;
    }

    // 流结束但没收到 done → 清理
    if (currentMsg) {
      removeThinkingIfEmpty();
      if (!currentMsg.querySelector('.content, .thinking-summary')) {
        currentMsg.remove();
      }
      currentMsg = null;
    }

  } catch (err) {
    const msg = err.message || String(err);
    // 清理 loading 或空气泡
    if (currentMsg) {
      currentMsg.innerHTML = `<div class="content" style="color:#ef4444;">❌ ${escapeHtml(msg)}</div>`;
      currentMsg = null;
    }
    $status.textContent = '错误';
  }

  $send.disabled = false;
  $input.disabled = false;
  $input.value = '';
  $input.focus();
}

$send.addEventListener('click', send);
$input.addEventListener('keydown', e => { if (e.key==='Enter') send(); });
</script>
</body>
</html>
