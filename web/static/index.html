<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Decisive Cat</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background:#111; color:#e0e0e0; height:100vh; display:flex; flex-direction:column; }
  header { background:#1a1a2e; padding:12px 20px; display:flex; align-items:center;
           gap:16px; border-bottom:1px solid #333; }
  header h1 { font-size:18px; color:#7c3aed; }
  header select { background:#222; color:#e0e0e0; border:1px solid #444;
                  padding:6px 12px; border-radius:6px; font-size:14px; cursor:pointer; }
  header .info { font-size:12px; color:#888; }
  #messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
  .msg { max-width:85%; padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.6;
         word-wrap:break-word; }
  .msg.user { align-self:flex-end; background:#7c3aed; color:#fff; }
  .msg.agent { align-self:flex-start; background:#1e1e2e; border:1px solid #333; }
  .msg .label { font-size:11px; font-weight:600; margin-bottom:4px; opacity:0.7; }
  .msg .content { white-space:pre-wrap; }
  .thought { padding:8px 12px; margin:4px 0; border-left:3px solid #f59e0b; font-size:13px;
             color:#fbbf24; background:#1a1a15; border-radius:0 6px 6px 0; }
  .tool-call { padding:8px 12px; margin:4px 0; border-left:3px solid #3b82f6; font-size:13px;
               background:#0f172a; border-radius:0 6px 6px 0; font-family:monospace; }
  .tool-call .name { color:#60a5fa; font-weight:600; }
  .tool-result { padding:8px 12px; margin:4px 0; border-left:3px solid #10b981; font-size:13px;
                 color:#6ee7b7; background:#0a1a15; border-radius:0 6px 6px 0;
                 max-height:200px; overflow-y:auto; }
  .orient { padding:6px 10px; margin:4px 0; font-size:12px; color:#94a3b8; font-style:italic; }
  /* 思考过程折叠 */
  .thinking-summary { display:inline-block; padding:3px 10px; margin:0 0 6px 0;
                       background:#1e1e2e; border:1px solid #333; border-radius:10px;
                       font-size:11px; color:#7c3aed; cursor:pointer; user-select:none;
                       transition: background .15s; }
  .thinking-summary:hover { background:#2a2a3e; }
  .thinking-summary::before { content:'▶ '; font-size:9px; }
  .thinking-summary.open::before { content:'▼ '; font-size:9px; }
  .thinking-block { display:none; }
  .thinking-block.visible { display:block; }
  footer { padding:16px 20px; border-top:1px solid #333; display:flex; gap:10px; background:#1a1a2e; }
  footer input { flex:1; background:#222; color:#e0e0e0; border:1px solid #444; padding:10px 16px;
                 border-radius:8px; font-size:14px; outline:none; }
  footer input:focus { border-color:#7c3aed; }
  footer button { background:#7c3aed; color:#fff; border:none; padding:10px 20px;
                  border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; }
  footer button:disabled { opacity:0.5; cursor:not-allowed; }
  .status { text-align:center; padding:8px; font-size:12px; color:#666; }
</style>
</head>
<body>

<header>
  <h1>🤖 Decisive Cat</h1>
  <select id="strategy">
    <option value="default">Default</option>
    <option value="react">ReAct</option>
    <option value="plan-execute">Plan-Execute</option>
    <option value="reflexion">Reflexion</option>
    <option value="tree-of-thought">Tree-of-Thought</option>
  </select>
  <span class="info" id="status">就绪</span>
</header>

<div id="messages"></div>

<div class="status" id="session-info"></div>

<footer>
  <input type="text" id="input" placeholder="输入任务..." autofocus />
  <select id="model" style="background:#222;color:#e0e0e0;border:1px solid #444;padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;">
    <option value="">Default</option>
    <option value="deepseek-v4-flash">deepseek-v4-flash</option>
    <option value="deepseek-v4-pro">deepseek-v4-pro</option>
    <option value="deepseek-chat">deepseek-chat</option>
    <option value="deepseek-reasoner">deepseek-reasoner</option>
  </select>
  <button id="send">发送</button>
</footer>

<script>
let SESSION_ID = localStorage.getItem('nano_session_id');
if (!SESSION_ID) {
  SESSION_ID = crypto.randomUUID().slice(0, 12);
  localStorage.setItem('nano_session_id', SESSION_ID);
}
const $messages = document.getElementById('messages');
const $input = document.getElementById('input');
const $send = document.getElementById('send');
const $strategy = document.getElementById('strategy');
const $model = document.getElementById('model');
const $status = document.getElementById('status');
document.getElementById('session-info').textContent = `会话: ${SESSION_ID}`;

let currentMsg = null;
let thinkingCount = 0;  // 当前消息的思考步骤数

// 页面加载时恢复历史对话
(async function restoreHistory() {
  try {
    const res = await fetch(`/api/sessions/${SESSION_ID}/history`);
    const data = await res.json();
    if (data.history && data.history.length > 0) {
      for (const msg of data.history) {
        addMessage(msg.role, msg.content);
      }
      $messages.scrollTop = $messages.scrollHeight;
    }
  } catch(e) { /* 忽略 */ }
})();

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = text ? `<div class="content">${linkify(text)}</div>` : '';
  $messages.appendChild(div);
  $messages.scrollTop = $messages.scrollHeight;
  return div;
}

function addThinkingBlock(cls, text) {
  // 确保有 thinking-block 容器
  let block = currentMsg.querySelector('.thinking-block');
  if (!block) {
    block = document.createElement('div');
    block.className = 'thinking-block';
    currentMsg.appendChild(block);
  }

  const inner = document.createElement('div');
  inner.className = cls;
  inner.innerHTML = linkify(text);
  block.appendChild(inner);

  thinkingCount++;
  // 更新标签
  let tag = currentMsg.querySelector('.thinking-summary');
  if (tag) tag.textContent = `👽 ${thinkingCount} 步思考过程`;

  $messages.scrollTop = $messages.scrollHeight;
}

function ensureThinkingTag() {
  if (!currentMsg) return;
  if (currentMsg.querySelector('.thinking-summary')) return;
  const tag = document.createElement('div');
  tag.className = 'thinking-summary';
  tag.textContent = `👽 ${thinkingCount} 步思考过程`;
  tag.addEventListener('click', () => {
    const block = currentMsg.querySelector('.thinking-block');
    if (!block) return;
    const open = block.classList.toggle('visible');
    tag.classList.toggle('open', open);
  });
  // 插入到消息最前面（content 之前）
  currentMsg.insertBefore(tag, currentMsg.firstChild);
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMarkdown(text) {
  // Simple markdown: bold, italic, headers, code
  // 注意: 必须在 linkify 之后调用，因为 linkify 会生成 <a> 标签
  let html = text;
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3 style="font-size:15px;margin:8px 0 4px;">$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2 style="font-size:16px;margin:8px 0 4px;">$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1 style="font-size:18px;margin:8px 0 4px;">$1</h1>');
  // Bold (skip if inside <a> tag)
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code style="background:#333;padding:1px 5px;border-radius:3px;font-size:12px;">$1</code>');
  return html;
}

function linkify(text) {
  // 1. escape HTML
  // 2. Markdown links: [text](url) → <a> (must be before bare URL)
  // 3. Bare URLs → <a>
  // 4. Render markdown (bold/italic/headers/code)
  const escaped = escapeHtml(text);
  // Markdown links first
  let linked = escaped.replace(
    /\[([^\]]+)\]\((https?:\/\/[^\s\)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener" style="color:#7c3aed;text-decoration:underline;">$1</a>'
  );
  // Bare URLs
  linked = linked.replace(
    /(https?:\/\/[^\s<>"']+?)(?:[)}\]>,.!?;:*_~]+)?(?=\s|$)/g,
    function(match, url) {
      const trailing = match.slice(url.length);
      return '<a href="' + url + '" target="_blank" rel="noopener" style="color:#7c3aed;text-decoration:underline;">' + url + '</a>' + trailing;
    }
  );
  // Then render markdown
  return renderMarkdown(linked);
}

async function send() {
  const task = $input.value.trim();
  if (!task) return;

  $send.disabled = true;
  $input.disabled = true;
  $status.textContent = '思考中...';
  thinkingCount = 0;

  addMessage('user', task);
  currentMsg = null;
  $messages.scrollTop = $messages.scrollHeight;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        message: task,
        strategy: $strategy.value,
        session_id: SESSION_ID,
        model: $model.value,
      }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});

      const parts = buffer.split('\n\n');
      buffer = parts.pop() || '';

      for (const part of parts) {
        const lines = part.split('\n');
        let eventType = '';
        let dataStr = '';

        for (const line of lines) {
          if (line.startsWith('event: ')) eventType = line.slice(7);
          if (line.startsWith('data: ')) dataStr = line.slice(6);
        }

        if (!dataStr) continue;
        try {
          const data = JSON.parse(dataStr);

          // 思考过程事件 → 折叠
          if (['text', 'tool_call', 'tool_result', 'orient'].includes(eventType)) {
            if (!currentMsg) currentMsg = addMessage('agent', '');
            ensureThinkingTag();
          }

          switch (eventType) {
            case 'text':
              if (data.text) {
                const el = document.createElement('div');
                el.textContent = data.text;
                el.style.cssText = 'color:#fbbf24;font-size:12px;margin:4px 0;';
                addThinkingBlock('thought', data.text);
              }
              break;
            case 'tool_call':
              addThinkingBlock('tool-call',
                `🔧 ${data.name}(${JSON.stringify(data.args)})`);
              break;
            case 'tool_result':
              addThinkingBlock('tool-result', data.result?.slice(0, 1000) || '');
              break;
            case 'orient':
              addThinkingBlock('orient',
                `💡 ${data.implication || data.interpretation || ''}`.slice(0, 200));
              break;
            case 'done':
              if (data.text && data.text !== 'Max iterations reached.') {
                currentMsg = null;
                addMessage('agent', data.text);
              }
              $status.textContent = '就绪';
              break;
            case 'error':
              if (!currentMsg) currentMsg = addMessage('agent', '');
              addThinkingBlock('tool-result', `❌ ${data.text}`);
              $status.textContent = '错误';
              break;
          }
        } catch(e) { /* skip malformed */ }
      }
      $messages.scrollTop = $messages.scrollHeight;
    }
  } catch (err) {
    addThinkingBlock('tool-result', `❌ 网络错误: ${err.message}`);
  }

  $send.disabled = false;
  $input.disabled = false;
  $input.value = '';
  $input.focus();
}

$send.addEventListener('click', send);
$input.addEventListener('keydown', e => { if (e.key==='Enter') send(); });
</script>
</body>
</html>
