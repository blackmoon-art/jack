<script>
// 访问码（管理员不用次数限制）
const ACCESS_CODE = '';
let SESSION_ID = localStorage.getItem('nano_session_id');
if (!SESSION_ID) {
  SESSION_ID = (function(){
  var d = new Date().getTime();
  if (typeof crypto !== 'undefined' && crypto.randomUUID) { return (function(){
  var d = new Date().getTime();
  if (typeof crypto !== 'undefined' && crypto.randomUUID) { return crypto.randomUUID(); }
  return 'xxxxxxxxxxxx'.replace(/[x]/g, function(c) {
    var r = (d + Math.random() * 16) % 16 | 0;
    d = Math.floor(d / 16);
    return r.toString(16);
  });
})(); }
  return 'xxxxxxxxxxxx'.replace(/[x]/g, function(c) {
    var r = (d + Math.random() * 16) % 16 | 0;
    d = Math.floor(d / 16);
    return r.toString(16);
  });
})().slice(0, 12);
  localStorage.setItem('nano_session_id', SESSION_ID);
}
const $messages = document.getElementById('messages');
const $input = document.getElementById('input');
const $send = document.getElementById('send');
const $strategy = document.getElementById('strategy');
const $model = document.getElementById('model');
const $fileInput = document.getElementById('file-input');
const $attachBtn = document.getElementById('attach-btn');
const $attachText = document.getElementById('attach-text');
const $uploadPreview = document.getElementById('upload-preview');

let uploadedFiles = [];  // { filename, path, size }

function uploadWithProgress(file, idx, total) {
  return new Promise((resolve, reject) => {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('session_id', SESSION_ID);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/upload');

    xhr.upload.addEventListener('progress', (e) => {
      if (e.lengthComputable) {
        const pct = Math.round(e.loaded / e.total * 100);
        const loadedKB = (e.loaded / 1024).toFixed(0);
        const totalKB = (e.total / 1024).toFixed(0);
        $uploadPreview.style.display = 'block';
        $uploadPreview.innerHTML = `📎 ${idx+1}/${total} — ${file.name} ${pct}% (${loadedKB}/${totalKB}KB)`;
      }
    });

    xhr.addEventListener('load', () => {
      if (xhr.status === 200) {
        try {
          const data = JSON.parse(xhr.responseText);
          if (data.ok) resolve(data);
          else reject(new Error(data.error || 'Upload failed'));
        } catch (e) { reject(new Error('Invalid response')); }
      } else {
        reject(new Error(`HTTP ${xhr.status}`));
      }
    });

    xhr.addEventListener('error', () => reject(new Error('Network error')));
    xhr.send(formData);
  });
}

$fileInput.addEventListener('change', async () => {
  const files = $fileInput.files;
  if (!files.length) return;

  let success = 0, fail = 0;
  for (let i = 0; i < files.length; i++) {
    try {
      const data = await uploadWithProgress(files[i], i, files.length);
      uploadedFiles.push(data);
      success++;
    } catch (e) {
      console.error('Upload failed:', e);
      fail++;
    }
  }

  $fileInput.value = '';

  if (uploadedFiles.length) {
    $uploadPreview.style.display = 'block';
    const items = uploadedFiles.map((f, idx) =>
      `<span style="color:#a78bfa;">${f.filename}</span> (${(f.size/1024).toFixed(1)}KB)` +
      `<a href="#" onclick="uploadedFiles.splice(${idx},1);if(!uploadedFiles.length){$uploadPreview.style.display='none'}else{renderUploadPreview()};return false" style="color:#ef4444;margin-left:4px;text-decoration:none;" title="Remove">❌</a>`
    ).join(', ');
    const failMsg = fail > 0 ? ` <span style="color:#ef4444;">(${fail} failed)</span>` : '';
    $uploadPreview.innerHTML = `upload success✅ ${items}${failMsg} <a href="#" onclick="uploadedFiles=[];$uploadPreview.style.display='none';return false" style="color:#ef4444;margin-left:8px;">delete all</a>`;
  }
});

function renderUploadPreview() {
  if (!uploadedFiles.length) { $uploadPreview.style.display = 'none'; return; }
  const items = uploadedFiles.map((f, idx) =>
    `<span style="color:#a78bfa;">${f.filename}</span> (${(f.size/1024).toFixed(1)}KB)` +
    `<a href="#" onclick="uploadedFiles.splice(${idx},1);if(!uploadedFiles.length){$uploadPreview.style.display='none'}else{renderUploadPreview()};return false" style="color:#ef4444;margin-left:4px;text-decoration:none;" title="Remove">❌</a>`
  ).join(', ');
  $uploadPreview.innerHTML = `upload success✅ ${items} <a href="#" onclick="uploadedFiles=[];$uploadPreview.style.display='none';return false" style="color:#ef4444;margin-left:8px;">delete all</a>`;
}

let currentMsg = null;
let thinkingCount = 0;
let chartImages = [];

// ── 历史恢复 ─────────────────────────────────────────

(async function restoreHistory() {
  try {
    const res = await fetch(`/api/sessions/${SESSION_ID}/history`, {
      headers: {'ngrok-skip-browser-warning': 'true'},
    });
    const data = await res.json();
    if (data.history && data.history.length > 0) {
      for (const msg of data.history) {
        addMessage(msg.role, msg.content);
      }
      $messages.scrollTop = $messages.scrollHeight;
    }
  } catch(e) { /* 忽略 */ }
})();

// ── 消息渲染 ─────────────────────────────────────────

function addMessage(role, text, extraHtml = '') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const content = text ? renderContent(text) : '';
  const body = extraHtml + (content ? `<div class="content">${content}</div>` : '');
  div.innerHTML = body || '';
  $messages.appendChild(div);
  $messages.scrollTop = $messages.scrollHeight;
  return div;
}

function addThinkingBlock(cls, text) {
  if (!currentMsg) return;
  let block = currentMsg.querySelector('.thinking-block');
  if (!block) {
    block = document.createElement('div');
    block.className = 'thinking-block';
    currentMsg.appendChild(block);
  }

  const inner = document.createElement('div');
  inner.className = cls;
  inner.innerHTML = escapeHtml(text);
  block.appendChild(inner);

  thinkingCount++;
  let tag = currentMsg.querySelector('.thinking-summary');
  if (tag) tag.textContent = `👽 ${thinkingCount} 步思考过程`;
}

function ensureThinkingTag() {
  if (!currentMsg) return;
  if (currentMsg.querySelector('.thinking-summary')) return;
  const tag = document.createElement('div');
  tag.className = 'thinking-summary';
  tag.textContent = `👽 ${thinkingCount} 步思考过程`;
  tag.addEventListener('click', () => {
    const block = tag.parentElement.querySelector('.thinking-block');
    if (!block) return;
    const open = block.classList.toggle('visible');
    tag.classList.toggle('open', open);
  });
  currentMsg.insertBefore(tag, currentMsg.firstChild);
}

function removeThinkingIfEmpty() {
  // 如果思考块里没有内容，移除整个折叠区域
  if (!currentMsg) return;
  const block = currentMsg.querySelector('.thinking-block');
  const tag = currentMsg.querySelector('.thinking-summary');
  if (block && !block.children.length) {
    block.remove();
    if (tag) tag.remove();
  }
}

// ── Markdown 渲染 ─────────────────────────────────────

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── KaTeX 数学公式渲染 ────────────────────────────────

function renderMath(el) {
  // 渲染 $$...$$ 块级公式和 $...$ 行内公式
  if (typeof renderMathInElement === 'undefined') return;
  try {
    renderMathInElement(el, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
      ],
      throwOnError: false,
      strict: false,
      trust: true,
      macros: {
        '\\R': '\\mathbb{R}',
        '\\N': '\\mathbb{N}',
        '\\Z': '\\mathbb{Z}',
      },
    });
  } catch(e) { /* 忽略 */ }
}

// ── Markdown 渲染 ─────────────────────────────────────

function renderContent(text) {
  // 1. Escape HTML
  let html = escapeHtml(text);

  // 2. Code blocks: ```lang\n...\n``` → <pre><code>...</code></pre>
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
    return `<pre><code>${code.trim()}</code></pre>`;
  });

  // 3. Markdown table: | ... | ... |\n|---|---|\n| ... | ... |
  html = html.replace(/((?:^\|.+\|$\n?)+)/gm, function(tableBlock) {
    const rows = tableBlock.trim().split('\n');
    let tableHtml = '<table>';
    let isHeader = true;
    for (const row of rows) {
      // Skip separator rows
      if (/^\|[\s:|-]+\|$/.test(row)) continue;
      const cells = row.split('|').filter(c => c.trim() !== '');
      const tag = isHeader ? 'th' : 'td';
      tableHtml += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
      isHeader = false;
    }
    tableHtml += '</table>';
    return tableHtml;
  });

  // 4. Images: ![alt](url) → <img>
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,
    '<img src="$2" alt="$1" />');

  // 5. Links: [text](url) → <a>
  html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s\)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>');
  html = html.replace(/\[([^\]]+)\]\((\/[^\s\)]+)\)/g,
    '<a href="$2" rel="noopener">$1</a>');

  // 6. Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // 7. Bold & Italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // 8. Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // 9. Unordered lists: - item or * item
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // 10. Bare URLs
  html = html.replace(/(https?:\/\/[^\s<>"']+)(?=\s|$)/g,
    '<a href="$1" target="_blank" rel="noopener">$1</a>');

  return html;
}

// ── 发送消息 ─────────────────────────────────────────

async function send() {
  let task = $input.value.trim();

  // 附加上传文件信息
  if (uploadedFiles.length) {
    const fileList = uploadedFiles.map(f => f.filename).join(', ');
    task = task ? `[Uploaded: ${fileList}] ${task}` : `[Uploaded: ${fileList}] Please analyze these files`;
  }

  if (!task) return;

  $send.disabled = true;
  $input.disabled = true;
  thinkingCount = 0;
  chartImages = [];

  addMessage('user', task);

  // 清除上传列表
  uploadedFiles = [];
  $uploadPreview.style.display = 'none';

  // 显示 loading 动画
  currentMsg = addMessage('agent', '');
  currentMsg.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

  $messages.scrollTop = $messages.scrollHeight;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'ngrok-skip-browser-warning': 'true',
      },
      body: JSON.stringify({
        message: task,
        strategy: $strategy.value,
        session_id: SESSION_ID,
        model: $model.value,
      }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let gotContent = false;  // 是否收到了实质内容

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});

      const parts = buffer.split('\n\n');
      buffer = parts.pop() || '';

      for (const part of parts) {
        const lines = part.split('\n');
        let eventType = '';
        let dataStr = '';

        for (const line of lines) {
          if (line.startsWith('event: ')) eventType = line.slice(7);
          if (line.startsWith('data: ')) dataStr = line.slice(6);
        }

        if (!dataStr) continue;
        try {
          const data = JSON.parse(dataStr);

          switch (eventType) {
            case 'text': {
              // 状态通知（Task/Strategy/计划等），显示在思考折叠块
              if (!gotContent) {
                // 第一次收到内容，移除 loading 动画
                currentMsg.innerHTML = '';
                gotContent = true;
              }
              if (data.text) {
                ensureThinkingTag();
                addThinkingBlock('thought', data.text);
              }
              break;
            }
            case 'tool_call': {
              if (!gotContent) { currentMsg.innerHTML = ''; gotContent = true; }
              ensureThinkingTag();
              addThinkingBlock('tool-call',
                `🔧 ${data.name}(${JSON.stringify(data.args)})`);
              break;
            }
            case 'tool_result': {
              if (!gotContent) { currentMsg.innerHTML = ''; gotContent = true; }
              ensureThinkingTag();
              addThinkingBlock('tool-result', data.result?.slice(0, 1000) || '');
              // 收集图表图片 URL
              const urls = (data.result || '').match(/!\[[^\]]*\]\((\/charts\/[^)]+)\)/g);
              if (urls) urls.forEach(m => {
                const u = m.match(/\(\/charts\/[^)]+\)/)[0].slice(1, -1);
                if (!chartImages.includes(u)) chartImages.push(u);
              });
              break;
            }
            case 'orient': {
              if (!gotContent) { currentMsg.innerHTML = ''; gotContent = true; }
              ensureThinkingTag();
              addThinkingBlock('orient',
                `💡 ${data.implication || data.interpretation || ''}`.slice(0, 200));
              break;
            }
            case 'done': {
              // 最终答案 → 替换当前消息内容
              if (data.text) {
                let answerText = data.text;
                // 修复 LLM 幻觉的绝对 URL → 替换为相对路径
                answerText = answerText.replace(
                  /!\[([^\]]*)\]\(https?:\/\/[^\s)]*\/charts\/([^\s)]+)\)/g,
                  '![$1](/charts/$2)'
                );
                answerText = answerText.replace(
                  /https?:\/\/[^\s]+\/(charts\/[^\s)]+)/g,
                  '/$1'
                );

                const imgs = chartImages.map(u =>
                  `<img src="${u}" style="max-width:100%;border-radius:8px;margin:8px 0;" />`
                ).join('');
                // 清空当前消息，显示最终答案
                currentMsg.innerHTML = imgs + `<div class="content">${renderContent(answerText)}</div>`;
                // 渲染数学公式
                const contentDiv = currentMsg.querySelector('.content');
                if (contentDiv) renderMath(contentDiv);
              } else {
                // done 没有 text，移除空气泡
                removeThinkingIfEmpty();
                if (!currentMsg.querySelector('.content, .thinking-summary')) {
                  currentMsg.remove();
                }
              }
              currentMsg = null;
              break;
            }
            case 'error': {
              if (!gotContent) { currentMsg.innerHTML = ''; gotContent = true; }
              ensureThinkingTag();
              addThinkingBlock('tool-result', `❌ ${data.text}`);
              break;
            }
          }
        } catch(e) { /* skip malformed */ }
      }
      $messages.scrollTop = $messages.scrollHeight;
    }

    // 流结束但没收到 done → 清理
    if (currentMsg) {
      removeThinkingIfEmpty();
      if (!currentMsg.querySelector('.content, .thinking-summary')) {
        currentMsg.remove();
      }
      currentMsg = null;
    }

  } catch (err) {
    const msg = err.message || String(err);
    // 清理 loading 或空气泡
    if (currentMsg) {
      currentMsg.innerHTML = `<div class="content" style="color:#ef4444;">❌ ${escapeHtml(msg)}</div>`;
      currentMsg = null;
    }
  }

  $send.disabled = false;
  $input.disabled = false;
  $input.value = '';
  $input.focus();
}

$send.addEventListener('click', send);
$input.addEventListener('keydown', e => { if (e.key==='Enter') send(); });
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js');
}
</script>
